version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kraai
    main: ./cmd
    binary: kraai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: kraai
    builds:
      - kraai
    name_template: "kraai_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

nfpms:
  - id: kraai
    package_name: kraai
    builds:
      - kraai
    vendor: Evatt Labs
    homepage: https://kraai.dev
    maintainer: Jordan Evatt <jordan@evattlabs.com>
    description: |-
      Kraai CLI — manage hosted MCP servers from the terminal.
      Turn any OpenAPI spec into a hosted MCP server endpoint compatible
      with Claude, ChatGPT, and other AI agents. Device-auth login,
      deployment lifecycle, workflows, policies, and billing.
    license: MIT
    section: utils
    priority: optional
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/kraai/LICENSE
        file_info:
          mode: 0644

checksum:
  name_template: "kraai_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: evatt-labs
    name: kraai-cli
  name_template: "v{{ .Version }}"
  header: |
    ## Kraai CLI {{ .Version }}

    Install with:
    ```bash
    curl -fsSL https://get.kraai.dev | sh
    ```

    Or download a binary directly from the assets below.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
