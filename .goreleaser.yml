version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kraai
    main: ./cmd
    binary: kraai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: kraai
    builds:
      - kraai
    name_template: "kraai_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE

checksum:
  name_template: "kraai_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: evatt-labs
    name: kraai-cli
  name_template: "v{{ .Version }}"
  header: |
    ## Kraai CLI {{ .Version }}

    Install with:
    ```bash
    # macOS / Linux
    curl -fsSL https://github.com/evatt-labs/kraai-cli/releases/download/v{{ .Version }}/kraai_{{ .Version }}_{{ .Os }}_{{ .Arch }}.tar.gz | tar -xz
    sudo mv kraai /usr/local/bin/
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
