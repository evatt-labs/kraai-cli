name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # GH_RELEASE_TOKEN is a GitHub PAT stored in Forgejo secrets.
          # Forgejo's auto-injected GITHUB_TOKEN only has access to the Forgejo
          # repo; GoReleaser needs a real GitHub token to publish to evatt-labs/kraai-cli.
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
